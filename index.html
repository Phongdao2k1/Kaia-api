<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaia Farm Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2c3e50;
        }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Dashboard Card */
        .main-card { background: var(--card); border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; border-bottom: 8px solid var(--primary); }
        .status-badge { position: absolute; top: 15px; right: 15px; background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .item-row { display: flex; align-items: center; gap: 20px; margin: 20px 0; }
        .icon-circle { width: 60px; height: 60px; background: #f9f9f9; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; border: 2px solid #eee; }
        .info { flex: 1; }
        .info label { font-size: 13px; color: #95a5a6; text-transform: uppercase; }
        .info .name { font-size: 20px; font-weight: bold; color: var(--text); }

        /* Countdown Timer */
        .timer-box { background: #34495e; color: white; border-radius: 15px; padding: 15px; text-align: center; margin-top: 10px; }
        .timer-value { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #f1c40f; }

        /* Upcoming Section */
        .upcoming { background: #fff; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .upcoming h3 { font-size: 15px; margin-top: 0; color: #7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .next-item { display: flex; justify-content: space-between; align-items: center; opacity: 0.7; }

        footer { margin-top: 30px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Kaia Monitor</h1>
        <p id="date-now"></p>
    </header>

    <div class="main-card">
        <div class="status-badge">LIVE</div>
        
        <div class="item-row">
            <div class="icon-circle" id="seed-icon">🌱</div>
            <div class="info">
                <label>Hạt giống hiện tại</label>
                <div class="name" id="seed-name">Đang tải...</div>
            </div>
        </div>

        <div class="item-row">
            <div class="icon-circle" id="weather-icon">☁️</div>
            <div class="info">
                <label>Thời tiết hiện tại</label>
                <div class="name" id="weather-name">Đang tải...</div>
            </div>
        </div>

        <div class="timer-box">
            <div>LÀM MỚI SAU</div>
            <div class="timer-value" id="countdown">05:00</div>
        </div>
    </div>

    <div class="upcoming">
        <h3>MÓN TIẾP THEO</h3>
        <div class="next-item">
            <span id="next-seed-name">Đang tính toán...</span>
            <span id="next-seed-icon">⏳</span>
        </div>
    </div>

    <footer>Cập nhật tự động theo server Play Together</footer>
</div>

<script>
    const API_URL = "realtime.json";

    async function updateDashboard() {
        try {
            const res = await fetch(API_URL + "?t=" + Date.now());
            const data = await res.json();
            
            // Tìm món hiện tại
            const seedIdx = data.seeds.findIndex(s => s.status);
            const seed = data.seeds[seedIdx];
            const weather = data.weather.find(w => w.status);
            
            // Tìm món tiếp theo
            const nextSeed = data.seeds[(seedIdx + 1) % data.seeds.length];

            // Hiển thị lên giao diện
            document.getElementById('seed-name').innerText = seed.name;
            document.getElementById('seed-icon').innerText = seed.icon;
            document.getElementById('weather-name').innerText = weather.name;
            document.getElementById('weather-icon').innerText = weather.icon;
            
            document.getElementById('next-seed-name').innerText = "Hạt giống: " + nextSeed.name;
            document.getElementById('next-seed-icon').innerText = nextSeed.icon;
            
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        } catch (e) {
            console.error("Lỗi API");
        }
    }

    function startCountdown() {
        setInterval(() => {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            
            // Tính số giây còn lại đến mốc 5 phút tiếp theo
            const remainingSeconds = 300 - ((minutes % 5) * 60 + seconds);
            
            const m = Math.floor(remainingSeconds / 60);
            const s = remainingSeconds % 60;
            
            document.getElementById('countdown').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            // Khi đếm ngược về 0 thì load lại data
            if (remainingSeconds === 299) updateDashboard();
        }, 1000);
    }

    updateDashboard();
    startCountdown();
</script>

</body>
</html>
